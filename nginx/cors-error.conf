# cors-error.conf
# Served internally when backend returns 502/503/504.
# Returns a JSON body with CORS headers so the browser does not block the
# response and React can detect the outage and show the maintenance overlay.
#
# $cors_origin is evaluated from the map{} block in load-balancer.conf 


location = /50x.json {
    internal;
    default_type application/json;

    # CORS headers — only set when origin is in the allowed list
    add_header 'Access-Control-Allow-Origin'      '$cors_origin' always;
    add_header 'Access-Control-Allow-Credentials' 'true'         always;

    # Always respond 503 regardless of whether the upstream error was 502/504
    return 503 '{"status":"down","code":503,"message":"Service temporarily unavailable. Please try again shortly."}';
}
